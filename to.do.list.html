<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f9f9f9;
      color: #333;
    }
    h1 {
      color: #2a7fb8;
    }
    ul {
      list-style-type: disc;
      padding-left: 20px;
    }
    li {
      margin: 6px 0;
    }
  </style>
</head>
<body>
  <h1>Shopping List</h1>
  <ul>
    <li>Milk</li>
    <li>Bread</li>
    <li>Butter</li>
    <li>Cheese</li>
    <li>Fruits (apples, bananas, oranges)</li>
    <li>Vegetables (tomatoes, spinach, carrots)</li>
    <li>Rice</li>
    <li>Pasta</li>
    <li>Toiletries (soap, shampoo, toothpaste)</li>
  </ul>
</body>
</html>
